<!DOCTYPE html>
<html>
<head>
    <title>CHUI MEDIA</title>
</head>
<body>
    <h1>Welcome to CHUI MEDIA</h1>
    <div>
        <h2>Login/Signup System</h2>
        <form>
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required><br>
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required><br>
            <input type="submit" value="Login">
        </form>
        <p>Don't have an account? <a href="#">Signup here!</a></p>
    </div>
    <div>
        <h2>Favorites Feature</h2>
        <p>Users can add movies and shows to their favorites list.</p>
    </div>
</body>
</html>
